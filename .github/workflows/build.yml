name: Build & Push Docker Images

# Triggered when code is merged (pushed) into any rc/* branch.
# Builds BOTH :dev and :latest images for web and admin apps in parallel.
# - :dev   → built with NEXT_PUBLIC_API_URL_DEV  (used by docker-compose.dev.yml)
# - :latest → built with NEXT_PUBLIC_API_URL_PROD (used by docker-compose.prod.yml)
# NEXT_PUBLIC_* vars must be baked in at build time — Next.js inlines them into
# the JS bundle during compilation, so separate images are required per environment.

on:
  push:
    branches:
      - 'rc/**'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web
            dockerfile: Dockerfile.web
            image: satryawiguna-web
          - app: admin
            dockerfile: Dockerfile.admin
            image: satryawiguna-admin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Development image (:dev) ────────────────────────────────────────────
      - name: Build and push ${{ matrix.app }}:dev
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: runner
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:dev
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL_DEV }}
          cache-from: type=gha,scope=${{ matrix.app }}-dev
          cache-to: type=gha,scope=${{ matrix.app }}-dev,mode=max

      # ── Production image (:latest) ──────────────────────────────────────────
      - name: Build and push ${{ matrix.app }}:latest
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: runner
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL_PROD }}
          cache-from: type=gha,scope=${{ matrix.app }}-prod
          cache-to: type=gha,scope=${{ matrix.app }}-prod,mode=max
