# Production environment — registry images, ports 3004 (web) & 3005 (admin)
# Usage: pnpm docker:prod:pull && pnpm docker:prod:up
#
# Images are built by CI and pushed to Docker Hub.
# Override defaults via env vars: REGISTRY, DOCKER_USERNAME, IMAGE_TAG

name: satryawiguna-prod

services:
  # ── Web (portfolio) ────────────────────────────────────────────────────────
  web:
    image: ${REGISTRY:-docker.io}/${DOCKER_USERNAME:-satryawiguna}/satryawiguna-web:${IMAGE_TAG:-latest}
    container_name: satryawiguna-web-prod
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      PORT: "3004"
      NEXT_TELEMETRY_DISABLED: 1
    env_file:
      - .env.production
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3004/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - prod-network

  # ── Admin (dashboard) ──────────────────────────────────────────────────────
  admin:
    image: ${REGISTRY:-docker.io}/${DOCKER_USERNAME:-satryawiguna}/satryawiguna-admin:${IMAGE_TAG:-latest}
    container_name: satryawiguna-admin-prod
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      PORT: "3005"
      NEXT_TELEMETRY_DISABLED: 1
    env_file:
      - .env.production
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3005/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - prod-network

networks:
  prod-network:
    name: satryawiguna-prod-network
    driver: bridge
